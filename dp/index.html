<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Programming Explorer — CS 141 Visualizer</title>
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <a href="../index.html" class="back-btn">&#8592; Back</a>
  <h1>Dynamic Programming Explorer</h1>
  <span class="tag dp">DP</span>
</div>

<!-- Main Grid -->
<div class="main">
  <!-- Left: Table Area -->
  <div class="graph-area">
    <!-- Tabs -->
    <div class="tabs" id="algoTabs">
      <button class="tab active" data-algo="knapsack01">0/1 Knapsack</button>
      <button class="tab" data-algo="knapsackUnbounded">Unbounded Knapsack</button>
      <button class="tab" data-algo="lcs">LCS</button>
      <button class="tab" data-algo="lis">LIS</button>
      <button class="tab" data-algo="editDistance">Edit Distance</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" id="backBtn" disabled>&#9664; Back</button>
      <button class="btn primary" id="stepBtn">Step &#9654;</button>
      <button class="btn" id="autoBtn">Play</button>
      <button class="btn danger" id="resetBtn">Reset</button>
      <div class="speed-control">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="100" max="1000" value="500" step="50">
        <span id="speedLabel">500ms</span>
      </div>
    </div>

    <!-- DP Table -->
    <div id="tableContainer" style="flex:1; overflow:auto; border-radius:12px; background:#0d0d20; border:1px solid #1a1a3a; padding:16px;"></div>

    <!-- Legend -->
    <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap; padding-top:8px;">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div> Computing</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Dependency</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e0e0e0"></div> Filled</div>
        <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Empty</div>
      </div>
    </div>
  </div>

  <!-- Sidebar (right) -->
  <div class="sidebar">
    <!-- Step Info -->
    <div class="sidebar-section">
      <h3>Step Info</h3>
      <div class="step-info" id="stepInfo">Select an algorithm tab to begin.</div>
    </div>

    <!-- Formula Bar -->
    <div class="sidebar-section">
      <h3>Formula</h3>
      <div class="formula-bar" id="formulaBar">—</div>
    </div>

    <!-- Decision -->
    <div class="sidebar-section">
      <h3>Decision</h3>
      <div class="step-info" id="decisionInfo">—</div>
    </div>

    <!-- Pseudocode -->
    <div class="sidebar-section">
      <h3>Pseudocode</h3>
      <div class="pseudocode" id="pseudocode"></div>
    </div>
  </div>
</div>

<!-- Scripts (order matters) -->
<script src="../shared/table-renderer.js"></script>
<script src="../shared/controls.js"></script>
<script src="algo-knapsack.js"></script>
<script src="algo-lcs.js"></script>
<script src="algo-lis.js"></script>
<script src="algo-edit-distance.js"></script>
<script src="presets.js"></script>
<script src="ui.js"></script>
</body>
</html>
